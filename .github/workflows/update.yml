name: Update World Cup Calendar

on:
  schedule:
    # Every 30 min during tournament window (Jun–Jul 2026).
    # GitHub may delay scheduled runs by up to 15 min under load — acceptable here
    # since Google Calendar itself only polls feeds every 12–24 hours.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen

      - name: Generate calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: uv run generate.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          # [skip ci] prevents this bot commit from re-triggering the workflow,
          # which would otherwise loop: commit → trigger → no change → commit → ...
          git diff --staged --quiet || git commit -m "chore: update calendar.ics [skip ci]"
          git push
