name: Update World Cup Calendar

on:
  schedule:
    # Adaptive schedule — generate.py rewrites this cron and commits it:
    # - Match day or day before → */30 * * * * (every 30 min)
    # - Tournament, quiet day  → 0 */3 * * *  (every 3 hours)
    # - Tournament over        → schedule block removed; only workflow_dispatch remains
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen

      - name: Push events to Google Calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_API_USE_MTLS_ENDPOINT: never
        run: uv run generate.py

      - name: Commit cron change if schedule was updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/update.yml
          # [skip ci] prevents this bot commit from re-triggering the workflow,
          # which would otherwise loop: commit → trigger → no change → commit → ...
          git diff --staged --quiet || git commit -m "chore: update cron schedule [skip ci]"
          git push
